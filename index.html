<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="description" content="MEETME - Social Network Platform with Posts and Feed">
    
    <title>MEETME Social Network</title>
    
    <!-- External CSS -->
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<header>
    MEETME
</header>

<div class="container">

    <!-- AUTHENTICATION SECTION -->
    <div id="authSection" class="card">
        <h2>Create Account or Login</h2>
        <p style="color: #666; margin-bottom: 15px;">Join MEETME and connect with friends!</p>
        
        <form id="authForm" onsubmit="return false;">
            <input type="text"
                   id="username"
                   placeholder="Username"
                   required>

            <input type="text"
                   id="contact"
                   placeholder="Phone Number or Email"
                   required>

            <input type="password"
                   id="password"
                   placeholder="Password (min 6 characters)"
                   required>

            <div style="margin-top: 15px;">
                <button type="button" onclick="signup()">
                    📝 Sign Up
                </button>
                <button type="button" onclick="login()" style="margin-left: 10px;">
                    🔓 Login
                </button>
            </div>
        </form>
    </div>

    <!-- FEED SECTION -->
    <div id="feedSection" class="hidden">
        
        <!-- Top Bar with Logout -->
        <div class="top-bar">
            <h2>Welcome to MEETME 👋</h2>
            <button class="logout-btn" onclick="logout()">🚪 Logout</button>
        </div>

        <!-- Create Post Card -->
        <div class="card">
            <h3>📝 Create Post</h3>
            <textarea id="postInput" 
                      rows="4" 
                      placeholder="What's on your mind? Share your thoughts!"></textarea>
            <button onclick="createPost()">📤 Post</button>
        </div>

        <!-- Posts Feed -->
        <div id="posts"></div>

    </div>

</div>

<!-- External JavaScript -->
<script src="js/app.js"></script>

</body>
</html>
