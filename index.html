<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="description" content="MEETME - Social Network Platform">
    
    <title>MEETME Social Network</title>
    
    <!-- External CSS -->
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<header>
    MEETME
</header>

<div class="container">

    <!-- SIGNUP PAGE -->
    <div id="signupPage">
        <h2>Create Account</h2>

        <form id="signupForm" onsubmit="return false;">
            <input type="text"
                   id="signupName"
                   placeholder="Full Name"
                   required>

            <input type="email"
                   id="signupEmail"
                   placeholder="Email Address"
                   required>

            <input type="password"
                   id="signupPassword"
                   placeholder="Password (min 6 characters)"
                   required>

            <button type="button" onclick="signup()">
                Create Account
            </button>
        </form>

        <p>
            Already have an account?
            <a onclick="showLogin()">Login</a>
        </p>
    </div>

    <!-- LOGIN PAGE -->
    <div id="loginPage" class="hidden">
        <h2>Login</h2>

        <form id="loginForm" onsubmit="return false;">
            <input type="email"
                   id="loginEmail"
                   placeholder="Email Address"
                   required>

            <input type="password"
                   id="loginPassword"
                   placeholder="Password"
                   required>

            <button type="button" onclick="login()">
                Login
            </button>
        </form>

        <p>
            Don't have an account?
            <a onclick="showSignup()">Create Account</a>
        </p>
    </div>

    <!-- DASHBOARD PAGE -->
    <div id="dashboard" class="hidden dashboard">
        <h2>Welcome To MEETME</h2>

        <div class="user-box">
            <h3 id="welcomeUser"></h3>
            <p id="userEmail"></p>
            <p>You are successfully logged in.</p>
        </div>

        <button class="logout-btn" onclick="logout()">
            Logout
        </button>
    </div>

</div>

<!-- External JavaScript -->
<script src="js/app.js"></script>

</body>
</html>
